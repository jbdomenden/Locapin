<!DOCTYPE html>
<html lang="en"><head>{{> partials/head.html}}</head><body>
<main class="auth-shell"><div class="auth-card">
<img src="/static/images/locapin-logo.png" alt="LocaPin" class="brand-logo" />
<h2>LocaPin Admin</h2>
<p>Manage tourism content for San Juan City.</p>
<p class="error-text">{{error}}</p>
<form action="/admin/login" method="post">
<label>Email</label><input type="email" name="email" required />
<label>Password</label><input type="password" name="password" required />
<button type="submit">Sign in</button>
</form>
</div></main>
{{> partials/scripts.html}}
</body></html>
