<form action="{{formAction}}" method="post">
<label>Name</label><input type="text" name="name" required value="{{planName}}" />
<label>Description</label><textarea name="description">{{planDescription}}</textarea>
<label>Price</label><input type="number" step="0.01" name="price" value="{{planPrice}}" />
<label>Billing period</label><select name="period">{{periodOptions}}</select>
<label><input type="checkbox" name="isActive" {{planActiveChecked}} /> Active</label>
<button type="submit">Save</button></form>
