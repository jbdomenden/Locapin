<a class="btn" href="/admin/attractions/new">Add Attraction</a>
<form action="/admin/attractions" method="get">
  <input type="text" name="search" placeholder="Search by name" value="${search!}" />
  <select name="cityId"><option value="">All cities</option><#list cities as c><option value="${c.id}" <#if selectedCityId?? && selectedCityId == c.id>selected</#if>>${c.name}</option></#list></select>
  <button type="submit">Apply</button>
</form>
<table>
<tr><th>Name</th><th>City</th><th>Area</th><th>Status</th><th>Featured</th><th>Actions</th></tr>
<#list attractions as a>
<tr><td>${a.name}</td><td>${a.cityName}</td><td>${a.areaName}</td><td>${a.status}</td><td>${a.isFeatured?string('Yes','No')}</td><td><a href="/admin/attractions/${a.id}">View</a> | <a href="/admin/attractions/${a.id}/edit">Edit</a></td></tr>
</#list>
</table>
