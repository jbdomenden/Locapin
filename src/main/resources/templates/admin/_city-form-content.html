<form action="<#if city??>/admin/cities/${city.id}<#else>/admin/cities</#if>" method="post">
  <label>Name</label>
  <input type="text" name="name" required value="${city.name!}" />
  <label><input type="checkbox" name="isPremium" <#if city?? && city.isPremium>checked</#if> /> Premium</label>
  <label>Status</label>
  <select name="status">
    <#list statuses as s><option value="${s}" <#if (city.status!'ACTIVE') == s?string>selected</#if>>${s}</option></#list>
  </select>
  <button type="submit">Save</button>
</form>
