<form action="<#if plan??>/admin/plans/${plan.id}<#else>/admin/plans</#if>" method="post">
  <label>Name</label><input type="text" name="name" required value="${plan.name!}" />
  <label>Description</label><textarea name="description">${plan.description!}</textarea>
  <label>Price</label><input type="number" step="0.01" name="price" value="${plan.price!}" />
  <label>Billing period</label><select name="period"><#list periods as p><option value="${p}" <#if (plan.billingPeriod!'MONTHLY') == p?string>selected</#if>>${p}</option></#list></select>
  <label><input type="checkbox" name="isActive" <#if !(plan??) || plan.isActive>checked</#if> /> Active</label>
  <button type="submit">Save</button>
</form>
