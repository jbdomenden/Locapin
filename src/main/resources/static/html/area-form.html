<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='icon' type='image/jpeg' href='/static/images/locapin-logo.jpg'><link rel='stylesheet' href='/static/css/base.css'><link rel='stylesheet' href='/static/css/layout.css'><link rel='stylesheet' href='/static/css/components.css'><title>LocaPin Admin • Area Form</title></head><body><div class='shell'><aside class='sidebar'><div class='brand'><img src='/static/images/locapin-logo.jpg'><div class='brand-text'><small>Admin Console</small><strong>LocaPin</strong></div></div><div class='nav-section'><p class='label'>Overview</p><a class='nav-link' href='/admin/dashboard'>🏠 Dashboard</a></div><div class='nav-section'><p class='label'>Content</p><a class='nav-link' href='/admin/cities'>🏙️ Cities</a><a class='nav-link' href='/admin/areas'>🗺️ Areas</a><a class='nav-link' href='/admin/attractions'>📍 Attractions</a><a class='nav-link' href='/admin/photos'>🖼️ Photos</a></div><div class='nav-section'><p class='label'>Monetization</p><a class='nav-link' href='/admin/plans'>💎 Plans</a><a class='nav-link' href='/admin/users'>👤 User Management</a></div></aside><main class='main'><header class='topbar'><div class='page-meta'><strong>Area Form</strong><small>Configure mapping coordinates and metadata.</small></div><div class='user-menu' data-user-menu><button class='btn icon alt' data-user-menu-btn>⋮</button><div class='dropdown-menu'><button class='dropdown-item' data-change-password>Change Password</button><button class='dropdown-item' onclick='logout()'>Logout</button></div></div></header><section class='container'><div class='surface'><div class='surface-head'><h1 class='page-title'>Area Details</h1></div><form id='areaForm' class='surface-body form-grid cols-2'><div class='field'><label>City</label><select id='cityId'></select></div><div class='field'><label>Name</label><input id='name' class='input' required></div><div class='field'><label>Center Latitude</label><input id='centerLatitude' class='input' type='number' step='any'></div><div class='field'><label>Center Longitude</label><input id='centerLongitude' class='input' type='number' step='any'></div><div class='field' style='grid-column:1/-1'><label>Boundary Data</label><textarea id='boundaryData' class='input'></textarea></div><div><button class='btn'>Save Area</button></div></form></div></section></main></div><div class='modal-backdrop' id='changePasswordModal'><div class='modal'><h3>Change Password</h3><form id='changePasswordForm' class='form-grid' style='margin-top:12px'><div class='field'><label>Current Password</label><input id='currentPassword' class='input' type='password' required></div><div class='field'><label>New Password</label><input id='newPassword' class='input' type='password' required></div><div class='field'><label>Confirm New Password</label><input id='confirmNewPassword' class='input' type='password' required></div><div id='changePasswordError' class='field-help' style='color:#b64c57'></div><div class='modal-actions'><button type='button' class='btn alt' data-close-modal>Cancel</button><button class='btn' type='submit'>Save Password</button></div></form></div></div><script src='/static/js/api.js'></script><script src='/static/js/ui.js'></script><script src='/static/js/auth.js'></script><script src='/static/js/area-form.js'></script></body></html>
