<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='icon' type='image/jpeg' href='/static/images/locapin-logo.jpg'><link rel='stylesheet' href='/static/css/base.css'><link rel='stylesheet' href='/static/css/layout.css'><link rel='stylesheet' href='/static/css/components.css'><title>LocaPin Admin • User Management</title></head><body>
<div class='shell'><aside class='sidebar'><div class='brand'><img src='/static/images/locapin-logo.jpg'><div class='brand-text'><small>Admin Console</small><strong>LocaPin</strong></div></div><div class='nav-section'><a class='nav-link' href='/admin/dashboard'>🏠 Dashboard</a><a class='nav-link' href='/admin/cities'>🏙️ Cities</a><a class='nav-link' href='/admin/areas'>🗺️ Areas</a><a class='nav-link' href='/admin/attractions'>📍 Attractions</a><a class='nav-link' href='/admin/photos'>🖼️ Photos</a><a class='nav-link' href='/admin/plans'>💎 Plans</a><a class='nav-link' href='/admin/users'>👤 User Management</a></div></aside><main class='main'><header class='topbar'><div class='page-meta'><strong>User Management</strong><small>Manage admin accounts and permissions.</small></div><div class='user-menu' data-user-menu><button class='btn icon alt' data-user-menu-btn>⋮</button><div class='dropdown-menu'><button class='dropdown-item' data-change-password>Change Password</button><button class='dropdown-item' onclick='logout()'>Logout</button></div></div></header><section class='container'><div class='surface'><div class='surface-head actions-row'><h1 class='page-title'>Admin Users</h1><a class='btn' href='/admin/users/new'>Create Admin</a></div><div class='surface-body'><div class='filters-row'><input id='userSearch' class='input' placeholder='Search name or email'><select id='roleFilter'><option value=''>All Roles</option><option value='SUPER_ADMIN'>SUPER_ADMIN</option><option value='MODERATOR'>MODERATOR</option></select><select id='statusFilter'><option value=''>All Status</option><option value='ACTIVE'>ACTIVE</option><option value='INACTIVE'>INACTIVE</option></select><button class='btn alt' onclick='loadUsers()'>Filter</button></div><div class='table-wrap' style='margin-top:12px'><table class='table'><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Action</th></tr></thead><tbody id='usersBody'></tbody></table></div></div></div></section></main></div>
<div class='modal-backdrop' id='changePasswordModal'><div class='modal'><h3>Change Password</h3><form id='changePasswordForm' class='form-grid' style='margin-top:12px'><div class='field'><label>Current Password</label><input id='currentPassword' class='input' type='password' required></div><div class='field'><label>New Password</label><input id='newPassword' class='input' type='password' required></div><div class='field'><label>Confirm New Password</label><input id='confirmNewPassword' class='input' type='password' required></div><div id='changePasswordError' class='field-help' style='color:#b64c57'></div><div class='modal-actions'><button type='button' class='btn alt' data-close-modal>Cancel</button><button class='btn' type='submit'>Save Password</button></div></form></div></div>
<script src='/static/js/api.js'></script><script src='/static/js/ui.js'></script><script src='/static/js/auth.js'></script><script src='/static/js/users.js'></script></body></html>
