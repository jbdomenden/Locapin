<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='icon' type='image/jpeg' href='/static/images/locapin-logo.jpg'><link rel='stylesheet' href='/static/css/base.css'><link rel='stylesheet' href='/static/css/layout.css'><link rel='stylesheet' href='/static/css/components.css'><title>LocaPin Admin • Admin User Form</title></head><body>
<div class='shell'><aside class='sidebar'><div class='brand'><img src='/static/images/locapin-logo.jpg'><div class='brand-text'><small>Admin Console</small><strong>LocaPin</strong></div></div><div class='nav-section'><a class='nav-link' href='/admin/dashboard'>🏠 Dashboard</a><a class='nav-link' href='/admin/users'>👤 User Management</a></div></aside><main class='main'><header class='topbar'><div class='page-meta'><strong>Admin User Form</strong><small>Create or edit admin account.</small></div></header><section class='container'><div class='surface'><div class='surface-head'><h1 class='page-title'>Account Details</h1></div><form id='adminUserForm' class='surface-body form-grid cols-2'><div class='field'><label>Full Name</label><input id='fullName' class='input' required></div><div class='field'><label>Email</label><input id='email' class='input' type='email' required></div><div class='field'><label>Role</label><select id='role'><option value='SUPER_ADMIN'>SUPER_ADMIN</option><option value='MODERATOR'>MODERATOR</option></select></div><div class='field'><label>Status</label><select id='status'><option value='ACTIVE'>ACTIVE</option><option value='INACTIVE'>INACTIVE</option></select></div><div class='field'><label>Password</label><input id='password' class='input' type='password'></div><div class='field'><label>Confirm Password</label><input id='confirmPassword' class='input' type='password'></div><div style='grid-column:1/-1'><h3>Permissions</h3><div id='permissionGrid' class='table-wrap'></div></div><div><button class='btn'>Save User</button></div></form></div></section></main></div>
