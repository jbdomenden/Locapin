<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><link rel='icon' type='image/jpeg' href='/static/images/locapin-logo.jpg'><link rel='stylesheet' href='/static/css/base.css'><link rel='stylesheet' href='/static/css/layout.css'><link rel='stylesheet' href='/static/css/components.css'><link rel='stylesheet' href='/static/css/pages.css'><title>LocaPin Admin • Photos</title></head><body>
<div class='shell'><aside class='sidebar'><div class='brand'><img src='/static/images/locapin-logo.jpg'><div class='brand-text'><small>Admin Console</small><strong>LocaPin</strong></div></div><div class='nav-section'><p class='label'>Overview</p><a class='nav-link' href='/admin/dashboard'>🏠 Dashboard</a></div><div class='nav-section'><p class='label'>Content</p><a class='nav-link' href='/admin/cities'>🏙️ Cities</a><a class='nav-link' href='/admin/areas'>🗺️ Areas</a><a class='nav-link' href='/admin/attractions'>📍 Attractions</a><a class='nav-link' href='/admin/photos'>🖼️ Photos</a></div><div class='nav-section'><p class='label'>Monetization</p><a class='nav-link' href='/admin/plans'>💎 Plans</a></div></aside><main class='main'><header class='topbar'><div class='page-meta'><strong>Photos</strong><small>Upload, reorder and maintain attraction media.</small></div><div class='user-menu' data-user-menu><button class='btn icon alt' data-user-menu-btn>⋮</button><div class='dropdown-menu'><button class='dropdown-item' data-change-password>Change Password</button><button class='dropdown-item' onclick='logout()'>Logout</button></div></div></header><section class='container'><div class='surface'><div class='surface-head'><h1 class='page-title'>Upload Photos</h1></div><div class='surface-body form-grid'><input id='photoFiles' type='file' multiple accept='image/*'><div id='preview' class='empty-state'>Choose one or more photos to preview before upload.</div><div class='actions-row'><button class='btn' type='button' onclick='uploadPhotos()'>Upload</button><button class='btn alt' type='button' onclick='saveOrder()'>Save Order</button></div></div></div><div class='surface'><div class='surface-head'><h3>Photo Library</h3></div><div class='surface-body'><div class='table-wrap'><table class='table'><thead><tr><th>ID</th><th>Preview</th><th>Sort</th><th>Action</th></tr></thead><tbody id='photosBody'></tbody></table></div></div></div></section></main></div>
<div class='modal-backdrop' id='changePasswordModal'><div class='modal'><h3>Change Password</h3><form id='changePasswordForm' class='form-grid' style='margin-top:12px'><div class='field'><label>Current Password</label><input id='currentPassword' class='input' type='password' required></div><div class='field'><label>New Password</label><input id='newPassword' class='input' type='password' required></div><div class='field'><label>Confirm New Password</label><input id='confirmNewPassword' class='input' type='password' required></div><div id='changePasswordError' class='field-help' style='color:#b64c57'></div><div class='modal-actions'><button type='button' class='btn alt' data-close-modal>Cancel</button><button class='btn' type='submit'>Save Password</button></div></form></div></div>
<script>document.getElementById('photoFiles').addEventListener('change',e=>{const files=[...e.target.files];preview.className=files.length?'':'empty-state';preview.innerHTML=files.length?files.map(f=>`<div>${f.name}</div>`).join(''): 'Choose one or more photos to preview before upload.'})</script>
<script src='/static/js/api.js'></script><script src='/static/js/ui.js'></script><script src='/static/js/auth.js'></script><script src='/static/js/photos.js'></script></body></html>
